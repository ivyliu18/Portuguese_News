<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leitura — Portuguese News Magazine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1612;
    --ink-muted: #6b6460;
    --ink-faint: #a09894;
    --paper: #faf8f4;
    --paper-warm: #f2ede4;
    --paper-card: #ffffff;
    --accent: #c4501a;
    --accent-light: #f5e8e0;
    --rule: #d4cdc4;
    --green: #2d6a4f;
    --green-light: #e8f5ee;
    --blue: #1a4a7a;
    --blue-light: #e8f0f8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* MASTHEAD */
  .masthead {
    border-bottom: 3px double var(--ink);
    padding: 1.5rem 2rem 1rem;
    text-align: center;
    background: var(--paper);
  }

  .masthead-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 0.4rem;
  }

  .masthead-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.8rem, 8vw, 5rem);
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--ink);
  }

  .masthead-subtitle {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-size: 0.9rem;
    color: var(--ink-muted);
    margin-top: 0.3rem;
  }

  .masthead-date {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-top: 0.6rem;
    font-weight: 300;
  }

  /* MAIN LAYOUT */
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  /* INPUT PANEL */
  .input-panel {
    border: 1px solid var(--rule);
    background: var(--paper-card);
    padding: 1.5rem;
    margin-bottom: 2rem;
  }

  .input-panel h2 {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .input-panel h2::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--rule);
  }

  .api-row {
    display: flex;
    gap: 8px;
    margin-bottom: 1rem;
    align-items: center;
  }

  .api-row label {
    font-size: 12px;
    color: var(--ink-muted);
    white-space: nowrap;
    font-weight: 500;
  }

  .api-row input {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid var(--rule);
    background: var(--paper);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--ink);
    outline: none;
  }

  .api-row input:focus {
    border-color: var(--accent);
  }

  .key-status {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 2px;
    white-space: nowrap;
    font-weight: 500;
  }

  .key-status.saved {
    background: var(--green-light);
    color: var(--green);
  }

  .key-status.unsaved {
    background: var(--accent-light);
    color: var(--accent);
  }

  .btn-clear-key {
    font-size: 11px;
    background: none;
    border: none;
    color: var(--ink-faint);
    cursor: pointer;
    text-decoration: underline;
    padding: 0;
    white-space: nowrap;
  }

  .btn-clear-key:hover { color: var(--accent); }

  textarea {
    width: 100%;
    min-height: 160px;
    padding: 12px;
    border: 1px solid var(--rule);
    background: var(--paper);
    font-family: 'Source Serif 4', serif;
    font-size: 14px;
    line-height: 1.7;
    color: var(--ink);
    resize: vertical;
    outline: none;
  }

  textarea:focus {
    border-color: var(--accent);
  }

  textarea::placeholder {
    color: var(--ink-faint);
    font-style: italic;
  }

  .btn-generate {
    margin-top: 1rem;
    width: 100%;
    padding: 12px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-generate:hover { background: var(--accent); }
  .btn-generate:disabled { background: var(--rule); cursor: not-allowed; }

  /* LOADING */
  .loading {
    display: none;
    text-align: center;
    padding: 3rem;
    color: var(--ink-muted);
    font-style: italic;
    font-family: 'Source Serif 4', serif;
  }

  .loading-dots::after {
    content: '';
    animation: dots 1.4s infinite;
  }

  @keyframes dots {
    0%, 20% { content: '.'; }
    40% { content: '..'; }
    60%, 100% { content: '...'; }
  }

  /* MAGAZINE OUTPUT */
  .magazine {
    display: none;
  }

  /* ARTICLE HEADER */
  .article-header {
    border-top: 3px solid var(--ink);
    padding-top: 1.5rem;
    margin-bottom: 2rem;
  }

  .article-kicker {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.5rem;
  }

  .article-headline {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 600;
    line-height: 1.25;
    color: var(--ink);
    margin-bottom: 0.8rem;
  }

  .article-deck {
    font-family: 'Source Serif 4', serif;
    font-size: 1.05rem;
    font-weight: 300;
    line-height: 1.65;
    color: var(--ink-muted);
    border-left: 3px solid var(--accent);
    padding-left: 1rem;
    margin-bottom: 1.5rem;
  }

  .article-meta {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-faint);
    border-top: 1px solid var(--rule);
    padding-top: 0.8rem;
  }

  /* ARTICLE BODY */
  .article-body {
    font-family: 'Source Serif 4', serif;
    font-size: 1rem;
    line-height: 1.85;
    color: var(--ink);
    margin-bottom: 2.5rem;
    column-count: 1;
  }

  .article-body p { margin-bottom: 1.2em; }

  /* SECTION DIVIDER */
  .section-divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 2rem 0 1.5rem;
  }

  .section-divider span {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-muted);
    white-space: nowrap;
  }

  .section-divider::before,
  .section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--rule);
  }

  /* VOCABULARY TABLE */
  .vocab-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0;
    border: 1px solid var(--rule);
    margin-bottom: 2rem;
    overflow: hidden;
  }

  .vocab-item {
    display: grid;
    grid-template-columns: 1fr 2fr;
    border-bottom: 1px solid var(--rule);
  }

  .vocab-item:last-child { border-bottom: none; }

  .vocab-pt {
    padding: 10px 14px;
    background: var(--paper-warm);
    border-right: 1px solid var(--rule);
  }

  .vocab-word {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--ink);
  }

  .vocab-pos {
    font-size: 11px;
    color: var(--ink-faint);
    font-style: italic;
    margin-top: 2px;
  }

  .vocab-en {
    padding: 10px 14px;
    background: var(--paper-card);
  }

  .vocab-definition {
    font-size: 0.88rem;
    color: var(--ink);
    line-height: 1.5;
  }

  .vocab-example {
    font-size: 0.82rem;
    color: var(--ink-muted);
    font-style: italic;
    margin-top: 4px;
  }

  /* KEY PHRASES */
  .phrase-list {
    margin-bottom: 2rem;
  }

  .phrase-item {
    border-left: 3px solid var(--green);
    padding: 0.8rem 1rem;
    margin-bottom: 0.8rem;
    background: var(--green-light);
  }

  .phrase-pt {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-style: italic;
    color: var(--green);
    margin-bottom: 0.3rem;
  }

  .phrase-en {
    font-size: 0.88rem;
    color: var(--ink);
    margin-bottom: 0.4rem;
  }

  .phrase-example {
    font-size: 0.82rem;
    color: var(--ink-muted);
    border-top: 1px solid #c5ddd0;
    padding-top: 0.4rem;
    margin-top: 0.4rem;
    font-style: italic;
  }

  /* QUIZ */
  .quiz-list {
    counter-reset: quiz;
    margin-bottom: 2rem;
  }

  .quiz-item {
    counter-increment: quiz;
    border: 1px solid var(--rule);
    margin-bottom: 1rem;
    background: var(--paper-card);
  }

  .quiz-question {
    padding: 1rem;
    font-family: 'Source Serif 4', serif;
    font-size: 0.95rem;
    line-height: 1.6;
    border-bottom: 1px solid var(--rule);
    background: var(--paper-warm);
    display: flex;
    gap: 10px;
  }

  .quiz-question::before {
    content: counter(quiz) '.';
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    color: var(--accent);
    min-width: 20px;
  }

  .quiz-options {
    padding: 0.8rem 1rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .quiz-option {
    padding: 8px 12px;
    border: 1px solid var(--rule);
    background: var(--paper);
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    text-align: left;
  }

  .quiz-option:hover { background: var(--blue-light); border-color: var(--blue); }
  .quiz-option.correct { background: var(--green-light); border-color: var(--green); color: var(--green); }
  .quiz-option.wrong { background: #fce8e8; border-color: #c0392b; color: #c0392b; }

  .quiz-answer {
    display: none;
    padding: 0.6rem 1rem;
    font-size: 0.82rem;
    color: var(--ink-muted);
    border-top: 1px solid var(--rule);
    font-style: italic;
  }

  /* PRINT / NEW ARTICLE BTN */
  .action-row {
    display: flex;
    gap: 1rem;
    margin-top: 2rem;
    border-top: 2px solid var(--ink);
    padding-top: 1.5rem;
  }

  .btn-secondary {
    flex: 1;
    padding: 10px;
    background: transparent;
    border: 1px solid var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--ink);
    transition: all 0.15s;
  }

  .btn-secondary:hover { background: var(--ink); color: var(--paper); }

  /* ERROR */
  .error-msg {
    display: none;
    background: #fce8e8;
    border: 1px solid #e74c3c;
    padding: 1rem;
    color: #c0392b;
    font-size: 0.9rem;
    margin-top: 1rem;
  }

  @media (max-width: 600px) {
    .quiz-options { grid-template-columns: 1fr; }
    .vocab-item { grid-template-columns: 1fr; }
    .vocab-pt { border-right: none; border-bottom: 1px solid var(--rule); }
    .masthead { padding: 1rem; }
  }

  @media print {
    .input-panel, .action-row { display: none !important; }
    .magazine { display: block !important; }
  }
</style>
</head>
<body>

<div class="masthead">
  <div class="masthead-label">Language Learning</div>
  <div class="masthead-title">Leitura</div>
  <div class="masthead-subtitle">Portuguese News · English Study</div>
  <div class="masthead-date" id="today-date"></div>
</div>

<div class="container">

  <div class="input-panel">
    <h2>Your API Key</h2>
    <div class="api-row">
      <label>Anthropic Key</label>
      <input type="password" id="api-key" placeholder="sk-ant-..." autocomplete="off" oninput="onKeyInput()">
      <span class="key-status unsaved" id="key-status">not saved</span>
      <button class="btn-clear-key" id="btn-clear-key" onclick="clearKey()" style="display:none">forget</button>
    </div>

    <h2>Paste Portuguese News</h2>
    <textarea id="news-input" placeholder="Cole aqui a notícia em português...&#10;&#10;Pode ser qualquer notícia — política, cultura, esportes. O app vai transformar em revista de estudo de inglês."></textarea>

    <button class="btn-generate" id="gen-btn" onclick="generate()">
      ✦ Generate Magazine
    </button>

    <div class="error-msg" id="error-msg"></div>
  </div>

  <div class="loading" id="loading">
    <p style="font-size:1.1rem;">Setting the press<span class="loading-dots"></span></p>
    <p style="font-size:0.85rem; margin-top:0.5rem; color: var(--ink-faint);">Transforming your article into a study magazine</p>
  </div>

  <div class="magazine" id="magazine">

    <div class="article-header">
      <div class="article-kicker" id="out-kicker">World News</div>
      <div class="article-headline" id="out-headline"></div>
      <div class="article-deck" id="out-deck"></div>
      <div class="article-meta" id="out-meta">Adapted for English Study · Original source: Portuguese</div>
    </div>

    <div class="article-body" id="out-body"></div>

    <div class="section-divider"><span>Vocabulary</span></div>
    <div class="vocab-grid" id="out-vocab"></div>

    <div class="section-divider"><span>Key Phrases</span></div>
    <div class="phrase-list" id="out-phrases"></div>

    <div class="section-divider"><span>Comprehension Quiz</span></div>
    <div class="quiz-list" id="out-quiz"></div>

    <div class="action-row">
      <button class="btn-secondary" onclick="window.print()">Print / Save PDF</button>
      <button class="btn-secondary" onclick="reset()">New Article</button>
    </div>

  </div>
</div>

<script>
// localStorage key management
const STORAGE_KEY = 'leitura_api_key';

function loadSavedKey() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    document.getElementById('api-key').value = saved;
    document.getElementById('key-status').textContent = '✓ saved';
    document.getElementById('key-status').className = 'key-status saved';
    document.getElementById('btn-clear-key').style.display = 'inline';
  }
}

function onKeyInput() {
  const val = document.getElementById('api-key').value.trim();
  const statusEl = document.getElementById('key-status');
  const clearBtn = document.getElementById('btn-clear-key');
  if (val.startsWith('sk-ant-') && val.length > 20) {
    localStorage.setItem(STORAGE_KEY, val);
    statusEl.textContent = '✓ saved';
    statusEl.className = 'key-status saved';
    clearBtn.style.display = 'inline';
  } else {
    statusEl.textContent = 'not saved';
    statusEl.className = 'key-status unsaved';
  }
}

function clearKey() {
  localStorage.removeItem(STORAGE_KEY);
  document.getElementById('api-key').value = '';
  document.getElementById('key-status').textContent = 'not saved';
  document.getElementById('key-status').className = 'key-status unsaved';
  document.getElementById('btn-clear-key').style.display = 'none';
}

const today = new Date();
loadSavedKey();
document.getElementById('today-date').textContent = today.toLocaleDateString('en-GB', { weekday:'long', year:'numeric', month:'long', day:'numeric' }).toUpperCase();

let quizAnswers = {};

async function generate() {
  const key = document.getElementById('api-key').value.trim();
  const news = document.getElementById('news-input').value.trim();
  const errEl = document.getElementById('error-msg');

  errEl.style.display = 'none';

  if (!key) { showError('Please enter your Anthropic API key.'); return; }
  if (!news || news.length < 50) { showError('Please paste a news article (at least 50 characters).'); return; }

  document.getElementById('gen-btn').disabled = true;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('magazine').style.display = 'none';

  const prompt = `You are an editor for a premium English language learning magazine inspired by Studio Classroom (空中英語教室). 

A learner has pasted a Portuguese news article. Transform it into a structured English study magazine edition.

PORTUGUESE ARTICLE:
${news}

Respond ONLY with a valid JSON object (no markdown, no backticks) with this exact structure:

{
  "kicker": "short category label (e.g. Politics, Culture, Economy)",
  "headline": "engaging English headline for the article",
  "deck": "2-sentence summary/teaser in polished English (the deck copy under the headline)",
  "body": "The full article rewritten in clear, natural English. 3-5 paragraphs. Aimed at upper-intermediate learners. Use varied vocabulary. Keep the original facts and meaning.",
  "vocabulary": [
    {
      "portuguese": "word or phrase from original",
      "pos": "noun / verb / adjective / phrase",
      "english": "English meaning",
      "example": "A natural English example sentence using the concept"
    }
  ],
  "phrases": [
    {
      "portuguese": "key phrase from original text",
      "english": "English equivalent or translation",
      "example": "A natural, everyday English example sentence showing the phrase in use"
    }
  ],
  "quiz": [
    {
      "question": "comprehension question about the article",
      "options": ["A) ...", "B) ...", "C) ...", "D) ..."],
      "answer": "A",
      "explanation": "brief explanation of why this is correct"
    }
  ]
}

Requirements:
- vocabulary: 6-8 interesting or advanced words from the original Portuguese
- phrases: 3-5 key structural phrases or expressions
- quiz: 4 questions testing comprehension of the English article
- All output must be valid JSON only`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 3000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || `API error ${res.status}`);
    }

    const data = await res.json();
    const raw = data.content[0].text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(raw);

    renderMagazine(parsed);

  } catch (e) {
    showError('Error: ' + e.message);
  } finally {
    document.getElementById('gen-btn').disabled = false;
    document.getElementById('loading').style.display = 'none';
  }
}

function renderMagazine(d) {
  document.getElementById('out-kicker').textContent = d.kicker || 'News';
  document.getElementById('out-headline').textContent = d.headline || '';
  document.getElementById('out-deck').textContent = d.deck || '';

  const body = document.getElementById('out-body');
  body.innerHTML = d.body.split('\n').filter(p => p.trim()).map(p => `<p>${p}</p>`).join('');

  const vocab = document.getElementById('out-vocab');
  vocab.innerHTML = (d.vocabulary || []).map(v => `
    <div class="vocab-item">
      <div class="vocab-pt">
        <div class="vocab-word">${v.portuguese}</div>
        <div class="vocab-pos">${v.pos}</div>
      </div>
      <div class="vocab-en">
        <div class="vocab-definition">${v.english}</div>
        <div class="vocab-example">"${v.example}"</div>
      </div>
    </div>
  `).join('');

  const phrases = document.getElementById('out-phrases');
  phrases.innerHTML = (d.phrases || []).map(p => `
    <div class="phrase-item">
      <div class="phrase-pt">${p.portuguese}</div>
      <div class="phrase-en">${p.english}</div>
      <div class="phrase-example">${p.example}</div>
    </div>
  `).join('');

  quizAnswers = {};
  const quiz = document.getElementById('out-quiz');
  quiz.innerHTML = (d.quiz || []).map((q, i) => {
    quizAnswers[i] = { answer: q.answer, explanation: q.explanation };
    return `
    <div class="quiz-item" id="quiz-${i}">
      <div class="quiz-question">${q.question}</div>
      <div class="quiz-options">
        ${(q.options || []).map(opt => `
          <button class="quiz-option" onclick="checkAnswer(${i}, '${opt.charAt(0)}')">${opt}</button>
        `).join('')}
      </div>
      <div class="quiz-answer" id="quiz-ans-${i}"></div>
    </div>`;
  }).join('');

  document.getElementById('loading').style.display = 'none';
  document.getElementById('magazine').style.display = 'block';
  document.getElementById('magazine').scrollIntoView({ behavior: 'smooth' });
}

function checkAnswer(qIdx, selected) {
  const correct = quizAnswers[qIdx].answer;
  const explanation = quizAnswers[qIdx].explanation;
  const item = document.getElementById(`quiz-${qIdx}`);
  const btns = item.querySelectorAll('.quiz-option');
  const ansEl = document.getElementById(`quiz-ans-${qIdx}`);

  btns.forEach(btn => {
    btn.disabled = true;
    if (btn.textContent.trim().startsWith(correct)) btn.classList.add('correct');
    else if (btn.textContent.trim().startsWith(selected) && selected !== correct) btn.classList.add('wrong');
  });

  ansEl.textContent = explanation;
  ansEl.style.display = 'block';
}

function reset() {
  document.getElementById('magazine').style.display = 'none';
  document.getElementById('news-input').value = '';
  document.getElementById('news-input').focus();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
